<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" width="900" height="560" role="img" aria-labelledby="chart-title chart-desc">
  <title id="chart-title">Conservation of organizational activity over time</title>
  <desc id="chart-desc">Line chart comparing organizational activity over 30 months across three configurations: Low Governance with High Proficiency (the He et al. spike-and-crash pattern), High Governance with High Proficiency (steady sustainable lift), and High Governance with Low Proficiency (stable slightly below baseline). All three converge toward the conservation level around index value 100, illustrating Lehman's Law 4.</desc>
  
  <style>
    .axis-line { stroke: #444; stroke-width: 1; }
    .grid-line { stroke: #ebe9e4; stroke-width: 0.5; }
    .grid-line-major { stroke: #d8d6d0; stroke-width: 0.5; }
    .tick-label { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 11px; fill: #666; }
    .axis-label { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 13px; fill: #333; }
    .title-text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 18px; font-weight: 500; fill: #1a1a1a; }
    .subtitle-text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 13px; fill: #666; }
    .legend-text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 12px; fill: #333; }
    .annotation-text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 11px; fill: #777; font-style: italic; }
    .data-line { fill: none; stroke-width: 2.5; }
    .conservation-line { fill: none; stroke: #999; stroke-width: 1; stroke-dasharray: 5,4; }
    .point-marker { stroke-width: 1.5; }
  </style>
  
  <rect width="900" height="560" fill="#ffffff"/>
  
  <text x="450" y="32" text-anchor="middle" class="title-text">Conservation of organizational activity</text>
  <text x="450" y="54" text-anchor="middle" class="subtitle-text">Different governance × proficiency configurations, same long-term equilibrium</text>
  
  <line class="grid-line" x1="100" y1="100" x2="820" y2="100"/>
  <line class="grid-line" x1="100" y1="140" x2="820" y2="140"/>
  <line class="grid-line" x1="100" y1="180" x2="820" y2="180"/>
  <line class="grid-line" x1="100" y1="220" x2="820" y2="220"/>
  <line class="grid-line-major" x1="100" y1="280" x2="820" y2="280"/>
  <line class="grid-line" x1="100" y1="320" x2="820" y2="320"/>
