  <text x="252" y="92" class="annotation-text" fill="#A32D2D">Transient velocity gain</text>
  <text x="540" y="395" class="annotation-text" fill="#A32D2D">Complexity debt overhang</text>
  <text x="676" y="232" class="annotation-text" fill="#0F6E56">Sustainable density gain</text>
  
  <g transform="translate(140, 520)">
    <line x1="0" y1="0" x2="28" y2="0" stroke="#E24B4A" stroke-width="2.5"/>
    <circle cx="14" cy="0" r="3.5" fill="#E24B4A"/>
    <text x="36" y="4" class="legend-text">Low governance · High proficiency</text>
    
    <line x1="232" y1="0" x2="260" y2="0" stroke="#1D9E75" stroke-width="2.5"/>
