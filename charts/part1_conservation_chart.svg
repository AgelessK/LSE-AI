  <line class="grid-line" x1="244" y1="100" x2="244" y2="440"/>
  <line class="grid-line" x1="388" y1="100" x2="388" y2="440"/>
  <line class="grid-line" x1="532" y1="100" x2="532" y2="440"/>
  <line class="grid-line" x1="676" y1="100" x2="676" y2="440"/>
  
  <line class="conservation-line" x1="100" y1="280" x2="820" y2="280"/>
  <text x="825" y="284" class="annotation-text">Conservation level (100)</text>
  
  <line class="axis-line" x1="100" y1="440" x2="820" y2="440"/>
  <line class="axis-line" x1="100" y1="100" x2="100" y2="440"/>
  
  <text x="92" y="445" text-anchor="end" class="tick-label">60</text>
  <text x="92" y="405" text-anchor="end" class="tick-label">70</text>
  <text x="92" y="365" text-anchor="end" class="tick-label">80</text>
  <text x="92" y="325" text-anchor="end" class="tick-label">90</text>
