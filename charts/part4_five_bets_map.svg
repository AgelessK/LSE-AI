    <text x="752" y="112" text-anchor="end" class="bet-label-main">AI-native startups</text>
    <text x="752" y="127" text-anchor="end" class="bet-label-sub">Cursor, Anthropic, Mercor, Midjourney, Lovable</text>
  </g>
  
  <g transform="translate(155, 510)">
    <circle cx="0" cy="0" r="8" fill="#1D9E75" stroke="#085041" stroke-width="1"/>
    <text x="14" y="4" class="legend-text">Sustainable / compounding</text>
    
    <circle cx="220" cy="0" r="8" fill="#EF9F27" stroke="#854F0B" stroke-width="1"/>
    <text x="234" y="4" class="legend-text">Conditional / falsifiable</text>
    
    <circle cx="420" cy="0" r="8" fill="#E24B4A" stroke="#A32D2D" stroke-width="1"/>
    <text x="434" y="4" class="legend-text">Likely to revert (empirical evidence in)</text>
  </g>
  
  <g transform="translate(155, 540)">
    <circle cx="0" cy="0" r="8" fill="#ffffff" stroke="#0F6E56" stroke-width="2.5" stroke-dasharray="4,3"/>
    <text x="14" y="4" class="legend-text">Under-observed durable bets — framework predicts, rarely branded as such</text>
  </g>
  
  <text x="450" y="585" text-anchor="middle" class="annotation">Illustrative positioning. Solid markers: announced bets, color encodes framework prediction. Outlined markers: durable bets that look like operational continuity</text>
  <text x="450" y="599" text-anchor="middle" class="annotation">rather than strategic announcements. The framework's specific claim: visibility is anti-correlated with durability — the most durable bets rarely make headlines.</text>
</svg>
