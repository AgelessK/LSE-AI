    <text x="512" y="356" class="bet-label-sub">Full replacement (reverted, partial reverted)</text>
  </g>
  
  <g>
    <circle cx="576.3" cy="251" r="11" fill="#EF9F27" stroke="#854F0B" stroke-width="1"/>
    <text x="593" y="247" class="bet-label-main">Cloudflare</text>
    <text x="593" y="262" class="bet-label-sub">Role elimination (measurer cuts)</text>
  </g>
  
  <g>
    <circle cx="711.7" cy="143" r="11" fill="#EF9F27" stroke="#854F0B" stroke-width="1"/>
