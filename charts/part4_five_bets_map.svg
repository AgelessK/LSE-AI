    <text x="223" y="341" class="under-observed-label-sub">Generator-Validator coupling, code review craft</text>
  </g>
  
  <g>
    <circle cx="314" cy="276" r="11" fill="#ffffff" stroke="#0F6E56" stroke-width="2.5" stroke-dasharray="4,3"/>
    <text x="331" y="272" class="under-observed-label-main">Verification infrastructure</text>
    <text x="331" y="287" class="under-observed-label-sub">Kiro, PBT tooling, observability platforms</text>
  </g>
  
  <g>
    <circle cx="386" cy="223" r="11" fill="#ffffff" stroke="#0F6E56" stroke-width="2.5" stroke-dasharray="4,3"/>
    <text x="403" y="219" class="under-observed-label-main">Business-environment feedback</text>
    <text x="403" y="234" class="under-observed-label-sub">Continuous user / market signal synthesis</text>
  </g>
  
  <g>
    <circle cx="278.3" cy="385" r="11" fill="#1D9E75" stroke="#085041" stroke-width="1"/>
