<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" width="900" height="620" role="img" aria-labelledby="chart-title chart-desc">
  <title id="chart-title">Organizational bets on AI productivity — public bets plus the durable bets the framework predicts</title>
  <desc id="chart-desc">Two-axis scatter plot positioning eight organizational bets. X-axis: degree of architectural intervention, from preserving existing structure (left) through eliminating roles (center) to rebuilding substrate (right). Y-axis: AI capability dependency, from current capability suffices (bottom) to frontier or future capability required (top). Solid markers: five publicly announced bets — Shopify and Duolingo (augmentation, framework predicts sustainable); Klarna and Salesforce (full replacement, framework predicts revert — empirical evidence in); Cloudflare (role elimination, conditional); Block (architectural substitution, conditional); AI-native startups including Cursor, Anthropic, Mercor, Midjourney, Lovable (built-in from inception, sustainable). Outlined markers: three durable bets the framework predicts but that rarely make headlines — verification infrastructure exemplified by Kiro at AWS, verification skill development including Generator-Validator coupling, and business-environment feedback synthesis. The outlined cluster sits in the lower-left region where almost no announced bets sit, illustrating the framework's observability bias warning: visibility is anti-correlated with durability.</desc>
  
  <style>
    .axis-line { stroke: #444; stroke-width: 1; }
    .grid-line { stroke: #ebe9e4; stroke-width: 0.5; }
    .tick-label { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 11px; fill: #666; }
    .axis-label { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 13px; fill: #333; }
    .axis-anchor { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 11px; fill: #888; font-style: italic; }
    .title-text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 18px; font-weight: 500; fill: #1a1a1a; }
    .subtitle-text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 13px; fill: #666; }
    .legend-text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 12px; fill: #333; }
    .annotation { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 11px; fill: #777; font-style: italic; }
    .bet-label-main { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 13px; font-weight: 500; fill: #1a1a1a; }
    .bet-label-sub { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 11px; fill: #555; }
    .under-observed-label-main { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 13px; font-weight: 500; fill: #0F6E56; }
    .under-observed-label-sub { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 11px; fill: #0F6E56; font-style: italic; }
    .region-label { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 11px; fill: #5DCAA5; font-style: italic; font-weight: 500; }
  </style>
  
  <rect width="900" height="620" fill="#ffffff"/>
  
  <text x="450" y="32" text-anchor="middle" class="title-text">Organizational bets on AI productivity</text>
  <text x="450" y="54" text-anchor="middle" class="subtitle-text">Five public bets, plus three the framework predicts compound but rarely make headlines</text>
  
  <rect x="170" y="270" width="280" height="170" fill="#1D9E75" fill-opacity="0.04" stroke="none"/>
  
  <line class="grid-line" x1="170" y1="116" x2="820" y2="116"/>
  <line class="grid-line" x1="170" y1="181" x2="820" y2="181"/>
  <line class="grid-line" x1="170" y1="246" x2="820" y2="246"/>
  <line class="grid-line" x1="170" y1="311" x2="820" y2="311"/>
  <line class="grid-line" x1="170" y1="376" x2="820" y2="376"/>
  
  <line class="grid-line" x1="332.5" y1="95" x2="332.5" y2="440"/>
  <line class="grid-line" x1="495" y1="95" x2="495" y2="440"/>
  <line class="grid-line" x1="657.5" y1="95" x2="657.5" y2="440"/>
  
  <line class="axis-line" x1="170" y1="440" x2="820" y2="440"/>
  <line class="axis-line" x1="170" y1="95" x2="170" y2="440"/>
  
  <text x="170" y="458" text-anchor="middle" class="axis-anchor">Preserve structure</text>
  <text x="495" y="458" text-anchor="middle" class="axis-anchor">Eliminate roles</text>
  <text x="820" y="458" text-anchor="middle" class="axis-anchor">Rebuild substrate</text>
  
  <text x="475" y="484" text-anchor="middle" class="axis-label">Degree of architectural intervention →</text>
  
  <text x="160" y="440" text-anchor="end" class="axis-anchor">Current</text>
  <text x="160" y="270" text-anchor="end" class="axis-anchor">Moderate</text>
  <text x="160" y="100" text-anchor="end" class="axis-anchor">Frontier</text>
  
  <text x="48" y="265" text-anchor="middle" class="axis-label" transform="rotate(-90 48 265)">AI capability dependency →</text>
  
  <g>
    <circle cx="206" cy="330" r="11" fill="#ffffff" stroke="#0F6E56" stroke-width="2.5" stroke-dasharray="4,3"/>
